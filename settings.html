{% extends 'base.html' %}
{% block title %}Settings — UniShare{% endblock %}
{% block content %}
<div class="page-inner" style="max-width:560px">
    <h1 style="margin-bottom:28px">Settings</h1>
    <form method="POST" class="form-card">
        <div class="field-row">
            <div class="field">
                <label>First name</label>
                <input type="text" name="first_name" value="{{ user.first_name }}" required />
            </div>
            <div class="field">
                <label>Last name</label>
                <input type="text" name="last_name" value="{{ user.last_name }}" required />
            </div>
        </div>
        <div class="field">
            <label>Email</label>
            <input type="email" value="{{ user.email }}" disabled style="opacity:.5;cursor:not-allowed" />
        </div>
        <div class="field">
            <label>Bio</label>
            <textarea name="bio" rows="3" placeholder="Tell other students a bit about yourself…">{{ user.bio or '' }}</textarea>
        </div>
        <hr style="border:none;border-top:1px solid var(--border);margin:20px 0" />
        <p style="font-size:.82rem;color:var(--muted);margin-bottom:12px">Change password — leave blank to keep current</p>
        <div class="field">
            <label>New password</label>
            <input type="password" name="password" placeholder="8+ characters" />
        </div>
        <button type="submit" class="btn btn-dark" style="margin-top:8px">Save changes</button>
    </form>
</div>
{% endblock %}
