{% extends 'base.html' %}
{% block title %}Post Bounty — UniShare{% endblock %}
{% block content %}
<div class="page-inner" style="max-width:560px">
    <h1 style="margin-bottom:28px">Post a bounty</h1>
    <form method="POST" class="form-card">
        <div class="field"><label>Title <span class="required">*</span></label><input type="text" name="title" required placeholder="e.g. Help me debug Python assignment" /></div>
        <div class="field-row">
            <div class="field"><label>Unit code</label><input type="text" name="unit_code" placeholder="CITS1401" style="text-transform:uppercase" /></div>
            <div class="field"><label>Reward ($)</label><input type="number" name="reward" min="0" step="0.01" placeholder="20.00" /></div>
        </div>
        <div class="field"><label>Description</label><textarea name="description" rows="3" placeholder="What do you need help with?"></textarea></div>
        <div style="display:flex;gap:10px;margin-top:8px">
            <button type="submit" class="btn btn-dark">Post bounty</button>
            <a href="{{ url_for('bounties') }}" class="btn btn-ghost">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
