{% extends 'base.html' %}
{% block title %}UniShare — Sign in{% endblock %}

{% block content %}
<main class="page-body">
    <div class="auth-logo">UniShare<span>.</span></div>
    <div class="auth-card">
        <div class="auth-tabs">
            <button class="auth-tab active" onclick="showLogin(this)">Sign in</button>
            <button class="auth-tab" onclick="showSignup(this)">Create account</button>
        </div>

        <!-- Sign in -->
        <div id="login-view">
            <form method="POST">
                <input type="hidden" name="action" value="login" />
                <div class="field">
                    <label>UWA email</label>
                    <input type="email" name="email" placeholder="23456789@student.uwa.edu.au" required />
                </div>
                <div class="field">
                    <label>Password</label>
                    <input type="password" name="password" placeholder="••••••••••" required />
                </div>
                <a href="#" class="forgot">Forgot password?</a>
                <button type="submit" class="btn-submit">Sign in</button>
            </form>
            <p class="auth-terms">By continuing you agree to our <a href="#">Terms</a> and <a href="#">Privacy Policy</a>.</p>
        </div>

        <!-- Register -->
        <div id="signup-view" style="display:none;">
            <form method="POST">
                <input type="hidden" name="action" value="register" />
                <div class="field-row">
                    <div class="field">
                        <label>First name</label>
                        <input type="text" name="first_name" placeholder="Jessica" required />
                    </div>
                    <div class="field">
                        <label>Last name</label>
                        <input type="text" name="last_name" placeholder="Thompson" required />
                    </div>
                </div>
                <div class="field">
                    <label>UWA student email</label>
                    <input type="email" name="email" placeholder="23456789@student.uwa.edu.au" required />
                </div>
                <div class="field">
                    <label>Password</label>
                    <input type="password" name="password" placeholder="8+ characters" required />
                </div>
                <div class="field">
                    <label>Confirm password</label>
                    <input type="password" name="confirm_password" placeholder="••••••••••" required />
                </div>
                <button type="submit" class="btn-submit">Create account</button>
            </form>
            <p class="auth-terms">By continuing you agree to our <a href="#">Terms</a> and <a href="#">Privacy Policy</a>.</p>
        </div>
    </div>
</main>

<footer class="page-footer">
    &copy; 2025 UniShare &middot; <a href="#">Help</a> &middot; <a href="#">Privacy</a>
</footer>

<script>
function showLogin(btn) {
    document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('login-view').style.display = '';
    document.getElementById('signup-view').style.display = 'none';
}
function showSignup(btn) {
    document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('login-view').style.display = 'none';
    document.getElementById('signup-view').style.display = '';
}
if (window.location.hash === '#signup') showSignup(document.querySelectorAll('.auth-tab')[1]);
</script>
{% endblock %}
