{% extends 'base.html' %}
{% block title %}Share Notes — UniShare{% endblock %}
{% block content %}
<div class="page-inner" style="max-width:560px">
    <h1 style="margin-bottom:28px">Share notes</h1>
    <form method="POST" class="form-card">
        <div class="field"><label>Title <span class="required">*</span></label><input type="text" name="title" required placeholder="e.g. CITS3403 Week 5 Summary" /></div>
        <div class="field-row">
            <div class="field"><label>Unit code <span class="required">*</span></label><input type="text" name="unit_code" required placeholder="CITS3403" style="text-transform:uppercase" /></div>
            <div class="field"><label>Semester</label><input type="text" name="semester" placeholder="S1 2025" /></div>
        </div>
        <div class="field"><label>Description</label><textarea name="description" rows="3" placeholder="What's covered in these notes?"></textarea></div>
        <div style="display:flex;gap:10px;margin-top:8px">
            <button type="submit" class="btn btn-dark">Share notes</button>
            <a href="{{ url_for('notes') }}" class="btn btn-ghost">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
